
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="calculator">
        <h2>🧮 Online Calculator</h2>

        <!-- Display Screen -->
        <div class="display">
            <div class="previous" id="previous"></div>
            <div class="current" id="current">0</div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button class="btn clear" onclick="clearAll()">AC</button>
            <button class="btn clear" onclick="deleteLast()">⌫</button>
            <button class="btn operator" onclick="addValue('%')">%</button>
            <button class="btn operator" onclick="addValue('/')">÷</button>

            <button class="btn number" onclick="addValue('7')">7</button>
            <button class="btn number" onclick="addValue('8')">8</button>
            <button class="btn number" onclick="addValue('9')">9</button>
            <button class="btn operator" onclick="addValue('*')">×</button>

            <button class="btn number" onclick="addValue('4')">4</button>
            <button class="btn number" onclick="addValue('5')">5</button>
            <button class="btn number" onclick="addValue('6')">6</button>
            <button class="btn operator" onclick="addValue('-')">−</button>

            <button class="btn number" onclick="addValue('1')">1</button>
            <button class="btn number" onclick="addValue('2')">2</button>
            <button class="btn number" onclick="addValue('3')">3</button>
            <button class="btn operator" onclick="addValue('+')">+</button>

            <button class="btn number zero" onclick="addValue('0')">0</button>
            <button class="btn number" onclick="addValue('.')">.</button>
            <button class="btn equals" onclick="calculate()">=</button>
        </div>

        <p class="footer-text">Built with ❤️ | Deployed via CI/CD 🚀</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
