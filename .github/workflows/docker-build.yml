name: Docker CI/CD

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

env:
  DOCKER_IMAGE: quidditchseeker666/calculator-app

jobs:
  lint:
    name: Lint Dockerfile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Debug - list files
        run: |
          ls -la
          ls -la calculator

      - name: Hadolint (lint)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: calculator/Dockerfile
          failure-threshold: error

  build:
    name: Build & Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Build image (load)
        uses: docker/build-push-action@v5
        with:
          context: ./calculator
          file: ./calculator/Dockerfile
          push: false
          load: true
          tags: ${{ env.DOCKER_IMAGE }}:test

      - name: Run container
        run: |
          docker rm -f test-container || true
          docker run -d -p 8080:80 --name test-container ${{ env.DOCKER_IMAGE }}:test
          sleep 3

      - name: HTTP test
        run: curl -fsS http://localhost:8080 >/dev/null

      - name: Cleanup
        if: always()
        run: docker rm -f test-container || true

  push:
    name: Push to Docker Hub
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./calculator
          file: ./calculator/Dockerfile
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}
